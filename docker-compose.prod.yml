services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: qa_app
    restart: always
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - mongo
    networks:
      - qa_network
    environment:
      - APP_ENV=production
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: qa_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - qa_network

  mysql:
    image: mysql:8.0
    container_name: qa_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - qa_mysql_data:/var/lib/mysql
    networks:
      - qa_network

  mongo:
    image: mongo:7.0
    container_name: qa_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - qa_mongo_data:/data/db
    networks:
      - qa_network

volumes:
  qa_mysql_data:
  qa_mongo_data:

networks:
  qa_network:
    driver: bridge
